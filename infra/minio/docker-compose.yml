name: spn-minio

services:
  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    container_name: spn-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # Allows storage-api to generate pre-signed URLs at the public hostname
      MINIO_SERVER_URL: https://s3.supanow.com
      MINIO_BROWSER_REDIRECT_URL: https://minio.supanow.com
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      # S3 API — used by all project storage containers
      - "traefik.enable=true"
      - "traefik.http.routers.spn-minio-s3.rule=Host(`s3.supanow.com`)"
      - "traefik.http.routers.spn-minio-s3.entrypoints=websecure"
      - "traefik.http.routers.spn-minio-s3.tls=true"
      - "traefik.http.routers.spn-minio-s3.tls.certresolver=cloudflare"
      - "traefik.http.services.spn-minio-s3.loadbalancer.server.port=9000"
      - "traefik.http.routers.spn-minio-s3.service=spn-minio-s3"
      # Console UI
      - "traefik.http.routers.spn-minio-console.rule=Host(`minio.supanow.com`)"
      - "traefik.http.routers.spn-minio-console.entrypoints=websecure"
      - "traefik.http.routers.spn-minio-console.tls=true"
      - "traefik.http.routers.spn-minio-console.tls.certresolver=cloudflare"
      - "traefik.http.services.spn-minio-console.loadbalancer.server.port=9001"
      - "traefik.http.routers.spn-minio-console.service=spn-minio-console"
    networks:
      - coolify

volumes:
  minio-data:
    name: spn-minio-data

networks:
  coolify:
    external: true
    name: coolify
