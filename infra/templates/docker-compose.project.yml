# mysuperdatabase — Project stack template
# Variables substituted by provision.sh via envsubst:
#   PROJECT_REF     — short unique slug (e.g. "abc123xyz")
#   JWT_SECRET      — random 64-char secret for JWT signing
#   ANON_KEY        — JWT signed with role=anon
#   SERVICE_KEY     — JWT signed with role=service_role
#   DB_PASSWORD     — PostgreSQL superuser password
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / SMTP_SENDER_NAME
#   SITE_URL        — public URL of the project (https://${PROJECT_REF}.mysuperdatabase.co)

name: msd-${PROJECT_REF}

x-restart: &restart
  restart: unless-stopped

services:

  # ────────────────────────────────────────────────────────────
  # PostgreSQL with pgvector, pg_net, pg_jsonschema, etc.
  # ────────────────────────────────────────────────────────────
  db:
    <<: *restart
    image: supabase/postgres:15.8.1.085
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${DB_PASSWORD}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:ro
    networks:
      - msd-${PROJECT_REF}

  # ────────────────────────────────────────────────────────────
  # GoTrue — Auth service
  # Config is loaded from ./auth.env (generated+updated by provision/update-auth-config scripts)
  # ────────────────────────────────────────────────────────────
  auth:
    <<: *restart
    image: supabase/gotrue:v2.189.0
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 3
    env_file:
      - ./auth.env
    networks:
      - msd-${PROJECT_REF}

  # ────────────────────────────────────────────────────────────
  # PostgREST — Auto REST API
  # ────────────────────────────────────────────────────────────
  rest:
    <<: *restart
    image: postgrest/postgrest:v14.12
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${DB_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    command: ["postgrest"]
    networks:
      - msd-${PROJECT_REF}

  # ────────────────────────────────────────────────────────────
  # Realtime — WebSocket broadcasts, presence, postgres changes
  # container_name must match "realtime-dev.XXX" for tenant detection
  # ────────────────────────────────────────────────────────────
  realtime:
    <<: *restart
    container_name: realtime-dev.msd-${PROJECT_REF}
    image: supabase/realtime:v2.102.3
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sSfL --head -o /dev/null -H \"Authorization: Bearer ${ANON_KEY}\" http://localhost:4000/api/tenants/realtime-dev/health"]
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 10s
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
    networks:
      - msd-${PROJECT_REF}

  # ────────────────────────────────────────────────────────────
  # Kong — API Gateway (routes all services under one host)
  # ────────────────────────────────────────────────────────────
  kong:
    <<: *restart
    image: kong/kong:3.9.1
    depends_on:
      db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-admin}
    volumes:
      - ./kong/${PROJECT_REF}.yml:/home/kong/kong.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.msd-${PROJECT_REF}.rule=Host(`${PROJECT_REF}.mysuperdatabase.co`)"
      - "traefik.http.routers.msd-${PROJECT_REF}.entrypoints=websecure"
      - "traefik.http.routers.msd-${PROJECT_REF}.tls=true"
      - "traefik.http.routers.msd-${PROJECT_REF}.tls.certresolver=cloudflare"
      - "traefik.http.services.msd-${PROJECT_REF}.loadbalancer.server.port=8000"
    networks:
      - msd-${PROJECT_REF}
      - coolify

  # ────────────────────────────────────────────────────────────
  # Storage — File storage (S3-compatible via MinIO)
  # ────────────────────────────────────────────────────────────
  storage:
    <<: *restart
    image: supabase/storage-api:v1.60.4
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/status"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${DB_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: s3
      GLOBAL_S3_BUCKET: msd-${PROJECT_REF}
      GLOBAL_S3_ENDPOINT: http://minio:9000
      GLOBAL_S3_FORCE_PATH_STYLE: "true"
      GLOBAL_S3_PROTOCOL: http
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      AWS_DEFAULT_REGION: us-east-1
      REGION: us-east-1
      UPLOAD_FILE_SIZE_LIMIT: 52428800
      UPLOAD_FILE_SIZE_LIMIT_STANDARD: 52428800
      TUS_URL_PATH: /storage/v1/upload/resumable
      TUS_URL_EXPIRY_MS: 3600000
      IMGPROXY_URL: http://imgproxy:5001
      ENABLE_IMAGE_TRANSFORMATION: "true"
    networks:
      - msd-${PROJECT_REF}

  # ────────────────────────────────────────────────────────────
  # Imgproxy — On-the-fly image transformations for Storage
  # ────────────────────────────────────────────────────────────
  imgproxy:
    <<: *restart
    image: darthsim/imgproxy:v3.30.1
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    networks:
      - msd-${PROJECT_REF}

  # ────────────────────────────────────────────────────────────
  # Meta (pg-meta) — Postgres metadata service used by Studio
  # ────────────────────────────────────────────────────────────
  meta:
    <<: *restart
    image: supabase/postgres-meta:v0.96.6
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - msd-${PROJECT_REF}

  # ────────────────────────────────────────────────────────────
  # Edge Runtime — Deno-based edge functions
  # ────────────────────────────────────────────────────────────
  edge-runtime:
    <<: *restart
    image: supabase/edge-runtime:v1.74.0
    depends_on:
      kong:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/127.0.0.1/9000'"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SITE_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/postgres
      VERIFY_JWT: "false"
    volumes:
      - functions-data:/home/deno/functions
      - deno-cache:/root/.cache/deno
    command: ["start", "--main-service", "/home/deno/functions/main"]
    networks:
      - msd-${PROJECT_REF}

volumes:
  db-data:
    name: msd-${PROJECT_REF}-db
  functions-data:
    name: msd-${PROJECT_REF}-functions
  deno-cache:
    name: msd-${PROJECT_REF}-deno-cache

networks:
  msd-${PROJECT_REF}:
    name: msd-${PROJECT_REF}
  coolify:
    external: true
    name: coolify
