name: msd-control-plane

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${CP_DB_PASSWORD:-changeme}
      POSTGRES_DB: mysuperdatabase_cp
    ports:
      - "5433:5432"
    volumes:
      - cp-db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      retries: 5

volumes:
  cp-db-data:
    name: msd-cp-db
