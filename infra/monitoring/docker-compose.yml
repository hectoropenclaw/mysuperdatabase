# supanow — Central monitoring stack
# Prometheus + Grafana + Loki + Promtail + cAdvisor + node-exporter
#
# Deploy: cd ~/supanow/infra/monitoring && docker compose up -d
# Grafana: https://grafana.hconsulting.app

services:
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: spn-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - coolify

  grafana:
    image: grafana/grafana:11.1.3
    container_name: spn-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_SERVER_DOMAIN: grafana.hconsulting.app
      GF_SERVER_ROOT_URL: https://grafana.hconsulting.app
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.spn-grafana.rule=Host(`grafana.hconsulting.app`)"
      - "traefik.http.routers.spn-grafana.entrypoints=websecure"
      - "traefik.http.routers.spn-grafana.tls=true"
      - "traefik.http.routers.spn-grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.spn-grafana.loadbalancer.server.port=3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - coolify

  loki:
    image: grafana/loki:3.1.0
    container_name: spn-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - coolify

  promtail:
    image: grafana/promtail:3.1.0
    container_name: spn-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - coolify

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: spn-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - coolify

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: spn-node-exporter
    restart: unless-stopped
    pid: host
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    networks:
      - coolify

volumes:
  prometheus-data:
    name: spn-prometheus-data
  grafana-data:
    name: spn-grafana-data
  loki-data:
    name: spn-loki-data

networks:
  coolify:
    external: true
    name: coolify
